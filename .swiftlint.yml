included:
  - AIDD-SAA-2025
  - AIDD-SAA-2025Tests
  - AIDD-SAA-2025UITests

excluded:
  - .build
  - DerivedData
  - "**/.build"

disabled_rules:
  - todo
  - trailing_comma

opt_in_rules:
  - empty_count
  - explicit_init
  - first_where
  - last_where
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unused_import
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces

line_length:
  warning: 120
  error: 140
  ignores_urls: true
  ignores_function_declarations: true
  ignores_comments: true

file_length:
  warning: 400
  error: 600

type_body_length:
  warning: 300
  error: 500

function_body_length:
  warning: 60
  error: 100

cyclomatic_complexity:
  warning: 12
  error: 20

identifier_name:
  min_length: 2
  excluded:
    - id
    - vm
    - x
    - y
    - bg
